        <p class="article-related-title">レジリエンス思考</p>
      </div>

      <div class="article-body">
        <p class="concept-summary">要素の単純な足し算ではなく、相互作用から立ち上がる全体のふるまいを捉える視点。</p>
        
        <p>複雑系とは、多数の要素が相互に影響し合い、その関係性のなかから予測しきれないパターンや秩序が生まれるシステムである。</p>
        
        <p>教育、組織、社会、研究コミュニティは、単線的な原因と結果だけでは十分に理解できない。変化を制御する対象としてではなく、適応し、学習し、しなやかに応答する系として見るための概念。</p>
