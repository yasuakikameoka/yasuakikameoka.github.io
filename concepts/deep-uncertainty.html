        <h1>Deep Uncertainty</h1>
        
      </div>

      <div class="article-body">
        <p class="concept-summary">未来の状態や確率を十分に特定できない状況で、なお判断し行動するための視点。</p>
        
        <p>Deep Uncertainty とは、何が起こりうるか、その可能性がどの程度か、どの価値基準で評価すべきかについて、合意や十分な知識がない状態である。</p>
        
        <p>不確実性を単に情報不足として扱うのではなく、複数の未来を前提にしながら、適応可能で頑健な選択を考えるための概念。</p>
