      <div class="article-body">
        <p class="concept-summary">才能や探究が立ち上がる前の時間を支える、長い目の支援と関係性。</p>
        
        <p>パトロネッジは、才能や探究がまだ明確な成果になる前の時間を支える関係性である。</p>
        
        <p>評価可能な実績が生まれる前には、しばしば余白、信頼、資源、場が必要になる。パトロネッジは、未確定な可能性に対して長い目を向け、個人の探究と社会的な支援を結び直すための概念。</p>
