</head>
<body>

  <header>
    <a class="site-name" href="../index.html">Yasuaki Kameoka</a>
    <nav>
      <a href="../index.html">Home</a>

  <main>
    <section class="profile-section">
      <div class="article-header">
        <h1 id="article-title"></h1>
        <p class="article-date" id="article-date"></p>
      </div>
      <div class="article-body" id="article-body"></div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="../script.js"></script>
  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const slug = params.get('post');

      if (!slug) {
        window.location.href = 'index.html';
        return;
      }

      fetch('posts/' + slug + '.md')
        .then(function (r) {
          if (!r.ok) throw new Error('not found');
          return r.text();
        })
        .then(function (text) {
          const parsed = parseFrontmatter(text);
          const meta = parsed.meta;
          const body = parsed.body;

          const title = meta.title || '';
          const date  = meta.date  || '';

          document.title = title + (title ? ' — ' : '') + 'Yasuaki Kameoka';

          const ogTitle = document.querySelector('meta[property="og:title"]');
          const ogDesc  = document.querySelector('meta[property="og:description"]');
          if (ogTitle) ogTitle.setAttribute('content', title + ' — 亀岡恭昂');
          if (ogDesc)  ogDesc.setAttribute('content', meta.description || '');

          document.getElementById('article-title').textContent = title;
          document.getElementById('article-date').textContent  = date;
          document.getElementById('article-body').innerHTML    = marked.parse(body);
        })
        .catch(function () {
          window.location.href = '../404.html';
        });

      function parseFrontmatter(text) {
        const match = text.match(/^---\r?\n([\s\S]*?)\r?\n---\r?\n([\s\S]*)$/);
        if (!match) return { meta: {}, body: text };

        const meta = {};
        match[1].split(/\r?\n/).forEach(function (line) {
          const colon = line.indexOf(':');
          if (colon === -1) return;
          const key = line.slice(0, colon).trim();
          const val = line.slice(colon + 1).trim();
          if (key) meta[key] = val;
        });

        return { meta: meta, body: match[2] };
      }
    })();
  </script>

</body>
</html>
